# ===========================
# CONFIGURACIÓN DEL SERVIDOR
# ===========================
server.port=78
server.servlet.context-path=/

# ===========================
# CONFIGURACIÓN DE LA BASE DE DATOS
# ===========================
spring.datasource.url=jdbc:mysql://localhost:3306/eventos?allowPublicKeyRetrieval=TRUE&useSSL=false&serverTimezone=UTC
spring.datasource.username=usuario_caso_practico_02
spring.datasource.password=12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2

# ===========================
# CONFIGURACIÓN DE JPA/HIBERNATE
# ===========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ===========================
# CONFIGURACIÓN DE THYMELEAF
# ===========================
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ===========================
# CONFIGURACIÓN DE LOGGING
# ===========================
logging.level.root=WARN
logging.level.plataforma=INFO
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.plataforma.config.CustomUserDetailsService=DEBUG
logging.level.org.springframework.security=DEBUG
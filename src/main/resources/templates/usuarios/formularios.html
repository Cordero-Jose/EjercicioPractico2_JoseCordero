<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${usuario.id != null ? 'Editar Usuario' : 'Crear Usuario'} + ' - Plataforma de Eventos'"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="bi bi-calendar-event"></i> Plataforma de Eventos
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/}">Inicio</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link" th:href="@{/usuarios}">Usuarios</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link" th:href="@{/roles}">Roles</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasAnyRole('ADMIN', 'ORGANIZADOR')">
                        <a class="nav-link" th:href="@{/eventos}">Eventos</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasAnyRole('ADMIN', 'CLIENTE', 'ORGANIZADOR')">
                        <a class="nav-link" th:href="@{/consultas}">Consultas</a>
                    </li>
                    <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                        <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown">
                            <span sec:authentication="name"></span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
                            <li><a class="dropdown-item" th:href="@{/logout}">Cerrar sesión</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <h1 class="display-5 fw-bold mb-4" th:text="${usuario.id != null ? 'Editar Usuario' : 'Crear Nuevo Usuario'}"></h1>

                <div class="card shadow">
                    <div class="card-body">
                        <!-- Formulario -->
                        <form th:action="${usuario.id != null ? '/usuarios/editar/' + usuario.id : '/usuarios'}" method="post" th:object="${usuario}">
                            <div class="mb-3">
                                <label for="nombre" class="form-label">Nombre Completo</label>
                                <input type="text" class="form-control" id="nombre" name="nombre" th:field="*{nombre}" required>
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" name="email" th:field="*{email}" required>
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label">Contraseña</label>
                                <input type="password" class="form-control" id="password" name="password" th:field="*{password}" required>
                            </div>

                            <div class="mb-3">
                                <label for="rolId" class="form-label">Rol</label>
                                <select class="form-select" id="rolId" name="rolId" required>
                                    <option value="">Selecciona un rol</option>
                                    <option th:each="rol : ${roles}" th:value="${rol.id}" th:text="${rol.nombre}"
                                        th:selected="${usuario.rol != null && usuario.rol.id == rol.id}"></option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="activo" class="form-label">Estado</label>
                                <select class="form-select" id="activo" name="activo" required>
                                    <option value="true" th:selected="${usuario.activo == true}">Activo</option>
                                    <option value="false" th:selected="${usuario.activo == false}">Inactivo</option>
                                </select>
                            </div>

                            <div class="d-grid gap-2 d-md-flex justify-content-md-between">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    <i class="bi bi-check-circle"></i> Guardar
                                </button>
                                <a th:href="@{/usuarios}" class="btn btn-secondary btn-lg">
                                    <i class="bi bi-arrow-left"></i> Cancelar
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="bg-dark text-white text-center py-4 mt-5">
        <div class="container">
            <p class="mb-0">&copy; 2026 Plataforma de Reservas de Eventos. Todos los derechos reservados.</p>
            <p class="mb-0">Desarrollado por José Cordero</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
